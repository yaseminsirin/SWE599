# Production Compose for DigitalOcean Droplet (or any VM).
# Usage:
#   cp .env.example .env   # edit for production
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "SKIP_EMBEDDING_WARMUP=1 python manage.py migrate --noinput &&
             SKIP_EMBEDDING_WARMUP=1 python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1 --preload --timeout 120"
    working_dir: /app/backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config worker -l info
    working_dir: /app/backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py setup_nightly_schedule &&
             celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    working_dir: /app/backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
